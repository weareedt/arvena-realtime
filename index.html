<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2D2DFF">
  <title>ARVENA · Realtime Scenario Generator — EDT</title>
  <meta name="description" content="Live-edit a presenter into a generated scenario in real time. An EDT production tool powered by Decart Lucy.">

  <!-- Favicon (EDT brand) -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon/favicon-96x96.png">
  <link rel="icon" href="assets/favicon/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">

  <!-- Brand fonts: Dela Gothic One (display) + Space Grotesk (body/UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ===== Fullscreen simulation layer (background) ===== -->
  <div class="sim-view">
    <video id="output" autoplay playsinline muted></video>
    <div id="output-placeholder" class="video-placeholder">
      <span>OUTPUT IDLE</span>
      <span class="small">Press START to generate</span>
    </div>
  </div>

  <!-- ===== UI overlay, rendered on top of the simulation ===== -->
  <div class="overlay">

    <header class="overlay-top">
      <div class="brand">
        <p class="eyebrow">EDT · ARVENA — PRODUCTION / BROADCAST</p>
        <h1 class="stage-title">SIMULATION VIEW</h1>
      </div>
      <div class="overlay-top-right">
        <span class="rec" id="rec-indicator" hidden>● ON AIR</span>
        <button id="ui-toggle" class="fs-btn" aria-label="Toggle UI visibility">▢ HIDE UI</button>
        <button id="fullscreen-btn" class="fs-btn" aria-label="Toggle fullscreen">⛶ FULLSCREEN</button>
      </div>
    </header>

    <div id="simulated-badge" class="simulated-badge" hidden>▓ SIMULATED — AI GENERATED ▓</div>

    <!-- Small inset: raw camera (always-on monitor) -->
    <div class="pip">
      <div class="pip-titlebar"><span>CAMERA.IN</span></div>
      <div class="pip-video">
        <video id="pip-cam" autoplay playsinline muted></video>
        <div id="pip-placeholder" class="pip-placeholder">NO CAMERA</div>
      </div>
    </div>

    <div class="overlay-bottom">
      <!-- Start / Stop -->
      <div class="stage-actions">
        <button id="go-live" class="btn-primary">START →</button>
        <button id="end-session" class="btn-secondary" disabled>STOP</button>
      </div>

      <!-- Compact scenario chips -->
      <div id="scenario-buttons" class="scenario-buttons stage-scenarios"><!-- injected by JS --></div>

      <p id="status-line" class="status-line">Idle</p>

      <footer class="console-footer">
        <span>EDT · EXPERIENTIAL DESIGN TEAM</span>
        <span class="muted">Synthetic media. Not real footage. Do not present as real news.</span>
        <button id="dev-toggle" class="dev-toggle" aria-pressed="false">USAGE METER · OFF</button>
      </footer>
    </div>

  </div>

  <!-- ===== Loading overlay (segmentation model warm-up) ===== -->
  <div id="loading-overlay" class="loading-overlay" hidden>
    <div class="spinner"></div>
    <p class="loading-text">LOADING SEGMENTATION MODEL</p>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
